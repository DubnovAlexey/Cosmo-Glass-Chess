<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Chess</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
</head>
<body>

<div class="chess-container">
    <h1 class="chess-title">Cyber Chess</h1>

    <div class="game-zone">
        <div class="board-area-wrapper">
            <div class="graveyard" id="graveyard-black"></div>
            <div class="board-wrapper" id="chessboard"></div>
            <div class="graveyard" id="graveyard-white"></div>
        </div>

        <div class="control-panel">
            <div class="timers-container">
                <div class="timer-card timer-white" id="timer-w">10:00</div>
                <div class="timer-card timer-black" id="timer-b">10:00</div>
            </div>

            <div class="controls-container">
                <button class="btn btn-start" id="btn-start">Start Match</button>
                <button class="btn btn-set" id="btn-open-time-modal">Set Time</button>
                <button class="btn" id="btn-restart">Restart</button>
                <button class="btn" id="btn-flip">Flip Board</button>
                <button class="btn" id="btn-pause">Pause</button>
            </div>
        </div>
    </div>
</div>

<dialog id="time-modal" class="cyber-modal">
    <div class="modal-content">
        <h2>Set Match Time</h2>
        <div class="input-group">
            <input type="number" id="time-input" class="time-input" step="0.1" min="0.1" value="10">
        </div>
        <div class="modal-actions">
            <button class="btn" id="btn-cancel-time">Cancel</button>
            <button class="btn btn-start" id="btn-confirm-time">Apply</button>
        </div>
    </div>
</dialog>

<script src="./js/chess-data.js"></script>
<script src="./js/chess-logic.js"></script>
<script src="./js/chess-render.js"></script>
<script src="./js/chess-timer.js"></script>
<script src="./js/main.js"></script>

</body>
</html>
